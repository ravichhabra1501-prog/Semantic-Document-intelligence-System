<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title or "NexusAI" }}</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.14);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #3b82f6;
      --accent-2: #8b5cf6;
      --success: #22c55e;
      --danger: #ef4444;
      --shadow: 0 24px 80px rgba(0,0,0,0.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", Arial, sans-serif;
      background:
        radial-gradient(circle at 8% 18%, rgba(59,130,246,0.16), transparent 26%),
        radial-gradient(circle at 84% 10%, rgba(139,92,246,0.16), transparent 24%),
        radial-gradient(circle at 70% 78%, rgba(14,165,233,0.10), transparent 30%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px 18px 60px; }
    header.app {
      display: flex; align-items: center; gap: 14px;
      padding: 22px 18px 6px; max-width: 1200px; margin: 0 auto;
      position: sticky; top: 0; z-index: 40;
      backdrop-filter: blur(18px);
      background: linear-gradient(180deg, rgba(11,18,32,0.92) 0%, rgba(11,18,32,0.78) 100%);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(59,130,246,0.18), rgba(139,92,246,0.18));
      display: grid; place-items: center;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    nav { margin-left: auto; display: flex; gap: 10px; align-items: center; }
    .nav-link {
      padding: 10px 12px;
      border-radius: 12px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: all 150ms ease;
      border: 1px solid transparent;
    }
    .nav-link:hover {
      color: var(--text);
      border-color: var(--border);
      background: rgba(255,255,255,0.05);
    }
    .nav-link.active {
      color: white;
      border-color: rgba(59,130,246,0.6);
      background: linear-gradient(145deg, rgba(59,130,246,0.18), rgba(139,92,246,0.16));
      box-shadow: 0 10px 30px rgba(59,130,246,0.3);
    }
    .card {
      background: linear-gradient(145deg, rgba(255,255,255,0.09), rgba(255,255,255,0.04));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 26px 90px rgba(0,0,0,0.5);
      border-color: rgba(255,255,255,0.18);
    }
    .grid { display: grid; gap: 18px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(145deg, var(--accent), var(--accent-2));
      color: white; font-weight: 700; letter-spacing: 0.01em;
      box-shadow: 0 10px 30px rgba(59,130,246,0.35);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 14px 34px rgba(59,130,246,0.42); }
    .btn.ghost {
      background: transparent;
      color: var(--text);
      border-color: var(--border);
      box-shadow: none;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.2);
      color: #bfdbfe;
      font-weight: 600; font-size: 12px;
    }
    .pill-muted {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .muted { color: var(--muted); font-size: 14px; }
    .title-xl { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
    .subtitle { font-size: 15px; color: var(--muted); margin-top:4px; }
    .section-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .table { width: 100%; border-collapse: collapse; }
    .table td, .table th { padding: 10px 6px; border-bottom: 1px solid var(--border); text-align: left; color: var(--muted); }
    .stat {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
    }
    .stat .value { font-size: 20px; font-weight: 800; color: var(--text); }
    .chip { display:inline-block; padding:4px 10px; border-radius: 999px; border:1px solid var(--border); color: var(--muted); font-size:12px; }
    input, select, textarea {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      width: 100%;
    }
    .hero {
      padding: 20px;
      border-radius: 20px;
      background: linear-gradient(120deg, rgba(59,130,246,0.16), rgba(139,92,246,0.12));
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content:"";
      position:absolute;
      width:160px;height:160px;
      top:-40px;right:-30px;
      background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 70%);
      filter: blur(20px);
      opacity:0.7;
    }
    .two-col { display:grid; gap:18px; grid-template-columns: 1.3fr 0.7fr; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } header.app { padding: 18px; } }
  </style>
</head>
<body>
  <header class="app">
    <div class="logo">
      <img src="/static/logo.svg" alt="Logo" width="28" height="28">
    </div>
    <div>
      <div style="font-weight:800; font-size:22px;">NexusAI Workspace</div>
      <div class="muted">Python mirror of the React experience</div>
    </div>
    <nav>
      {% set path = request.url.path %}
      <a href="/" class="nav-link {% if path == '/' or path.startswith('/documents') %}active{% endif %}">Dashboard</a>
      <a href="/analytics" class="nav-link {% if path.startswith('/analytics') %}active{% endif %}">Analytics</a>
      <a href="/settings" class="nav-link {% if path.startswith('/settings') %}active{% endif %}">Settings</a>
    </nav>
  </header>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
